# SwiftLint configuration for WePLi
reporter: xcode

# 검사 대상/제외 경로
included:
  - Projects
excluded:
  - Tuist/Dependencies
  - Tuist/Cache
  - Derived
  - DerivedData
  - .build
  - build
  - Scripts
  - "**/Demo/**"
  - "**/*.generated.swift"
  - "**/*+Generated.swift"
  - "**/*.pb.swift"

# 기본 해제할 규칙
disabled_rules:
  - trailing_whitespace
  - todo                     # TODO를 경고로 안 보고 싶으면 비활성화
  - redundant_optional_initialization

opt_in_rules:
  - anyobject_protocol
  - attributes
  - closure_spacing
  - collection_alignment
  - contains_over_first_not_nil
  - convenience_type
  - empty_count
  - explicit_self
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - ordered_imports
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - return_value_from_void_function
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

# 일반 규칙 파라미터
line_length:
  warning: 120
  error: 140
  ignores_urls: true
  ignores_comments: true

file_length:
  warning: 1000
  error: 1500

type_body_length:
  warning: 350
  error: 500

function_body_length:
  warning: 80
  error: 120

cyclomatic_complexity:
  warning: 15
  error: 25
  ignores_case_statements: true

identifier_name:
  min_length: 2
  max_length: 40
  excluded: [id, i, x, y, rx, url, db, vm, ui, to, up, on, in, at]

force_cast: warning
force_try: warning
force_unwrapping: warning

# 가져오기 정리
ordered_imports:
  prefer_self_imports: true

custom_rules:
  no_print_in_app:
    name: "No print() in app code"
    regex: "\\bprint\\("
    message: "Use OSLog/Logger or proper logging instead of print()."
    severity: warning
    excluded:
      - "Tests"

# 참고: 아래 analyzer_rules는 `swiftlint analyze`로만 동작(컴파일 로그 필요).
# analyzer_rules:
#   - unused_declaration
#   - unused_import