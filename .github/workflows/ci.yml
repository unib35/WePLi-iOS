name: WePLi CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      lint: ${{ steps.filter.outputs.lint }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'Projects/**'
              - 'Tuist/**'
              - 'Configs/**'
              - 'Scripts/**'
              - '**/Package.resolved'
              - '**/Tuist/Dependencies.lock'
              - '**/*.xcodeproj'
              - '**/*.xcworkspace'
            lint:
              - 'Projects/**/*.swift'
              - '.swiftlint.yml'

  lint:
    name: "Run SwiftLint"
    needs: changes
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run SwiftLint
        if: ${{ needs.changes.outputs.lint == 'true' }}
        run: |
          echo "Lint files changed. Running SwiftLint..."
          brew install swiftlint
          swiftlint --strict --quiet --reporter github-actions-logging
      
      - name: No lint changes
        if: ${{ needs.changes.outputs.lint != 'true' }}
        run: echo "No files requiring a lint check were changed. Skipping."

  build-test:
    name: "Build & Unit Test"
    needs: [changes, lint]
    if: ${{ always() }}
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Check Lint Job Status
        if: ${{ needs.lint.result != 'success' }}
        run: |
          echo "Lint job failed. Aborting build and test."
          exit 1
      
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: No code changes
        if: ${{ needs.changes.outputs.code != 'true' }}
        run: echo "No code files were changed. Skipping build and test."

      - name: Select Xcode Version
        if: ${{ needs.changes.outputs.code == 'true' }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Cache SPM
        if: ${{ needs.changes.outputs.code == 'true' }}
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/SourcePackages
            ~/.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', '**/Tuist/Dependencies.lock') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Cache Tuist Dependencies
        if: ${{ needs.changes.outputs.code == 'true' }}
        uses: actions/cache@v4
        with:
          path: Tuist/Dependencies
          key: ${{ runner.os }}-tuist-${{ hashFiles('**/Tuist/Dependencies.lock') }}
          restore-keys: |
            ${{ runner.os }}-tuist-

      - name: Setup Environment and Run Tests
        if: ${{ needs.changes.outputs.code == 'true' }}
        run: |
          set -e
          echo "::group::Setup Environment"
          brew install xcbeautify
          brew install tuist
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
          echo "::endgroup::"

          echo "::group::Resolve Dependencies"
          tuist install
          echo "::endgroup::"

          echo "::group::Generate Project"
          tuist generate --no-open
          echo "::endgroup::"

          echo "::group::Pick and Boot Simulator"
          SIM_ID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/{print $2; exit}')
          if [ -z "$SIM_ID" ]; then
            echo "No available iPhone simulator found"; exit 1
          fi
          echo "Using Simulator ID: $SIM_ID"
          xcrun simctl boot "$SIM_ID" || true
          echo "::endgroup::"

          echo "::group::Build and Test"
          set -o pipefail && xcodebuild \
            -workspace WePLi.xcworkspace \
            -scheme WePLi \
            -destination "id=$SIM_ID" \
            -enableCodeCoverage YES \
            clean test | tee xcodebuild.log | xcbeautify
          echo "::endgroup::"

      - name: Upload Xcode Build Log on Failure
        if: ${{ failure() && needs.changes.outputs.code == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
          if-no-files-found: ignore

