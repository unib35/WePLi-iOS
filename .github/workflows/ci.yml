name: WePLi CI

on:
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
      - '.github/CONTRIBUTING.md'
      - '.github/dependabot.yml'
      - '.github/CODEOWNERS'
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
      - '.github/CONTRIBUTING.md'
      - '.github/dependabot.yml'
      - '.github/CODEOWNERS'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: macos-14
    outputs:
      code: ${{ steps.filter.outputs.code }}
      lint: ${{ steps.filter.outputs.lint }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.swift'
              - 'Projects/**'
              - 'Tuist/**'
              - 'Configs/**'
              - 'Scripts/**'
              - 'Package.resolved'
              - 'Tuist/Dependencies.lock'
              - '**/*.xcodeproj'
              - '**/*.xcworkspace'
            lint:
              - '**/*.swift'
              - '.swiftlint.yml'
              - 'Scripts/swiftlint.sh'

  # SwiftLint
  lint:
    name: Run SwiftLint
    needs: changes
    if: ${{ needs.changes.outputs.lint == 'true' }}
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: SwiftLint
        run: swiftlint --reporter github-actions-logging

  # Build & Test
  build-test:
    name: Build & Unit Test
    needs: [changes, lint]
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/SourcePackages
            ~/.swiftpm
          key: macOS-spm-${{ hashFiles('**/Package.resolved', 'Tuist/Package.resolved', 'Tuist/Dependencies.lock') }}
          restore-keys: |
            macOS-spm-

      - name: Cache Tuist Dependencies
        uses: actions/cache@v4
        with:
          path: Tuist/Dependencies
          key: macOS-tuist-${{ hashFiles('Tuist/Dependencies.lock') }}
          restore-keys: |
            macOS-tuist-

      - name: Install Tuist
        run: |
          brew update
          brew install tuist
          tuist version

      - name: Tuist Install
        run: tuist install

      - name: Tuist Generate
        run: tuist generate --no-open

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Allow Macro Plugins
        run: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES

      - name: Pick Simulator
        id: pick-sim
        shell: bash
        run: |
          set -e
          sim_id=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/{print $2; exit}')
          if [ -z "$sim_id" ]; then
            echo "No available iPhone simulator found"; exit 1
          fi
          echo "SIM_ID=$sim_id" >> $GITHUB_OUTPUT
          xcrun simctl boot "$sim_id" || true

      # Build
      - name: Build
        shell: bash
        run: |
          set -o pipefail
          xcodebuild -workspace WePLi.xcworkspace \
                     -scheme WePLi \
                     -destination "id=${{ steps.pick-sim.outputs.SIM_ID }}" \
                     -configuration Debug \
                     build | xcbeautify

      # Test
      - name: Test
        shell: bash
        run: |
          set -o pipefail
          xcodebuild -workspace WePLi.xcworkspace \
                     -scheme WePLi \
                     -destination "id=${{ steps.pick-sim.outputs.SIM_ID }}" \
                     -configuration Debug \
                     -enableCodeCoverage YES \
                     test | xcbeautify