# .github/dependabot.yml

# Dependabot 설정 파일 버전
version: 2
updates:
  # Swift Package Manager (SPM) 의존성을 검사할 설정
  - package-ecosystem: "swift"
    # 프로젝트 루트 디렉토리를 검사
    directory: "/Tuist"
    # 매주 월요일 오전에 업데이트를 확인할 스케줄
    schedule:
      interval: "weekly"
      day: "monday"
    # PR에 자동으로 붙일 라벨
    labels:
      - "dependencies"
    # PR을 할당할 사용자 (본인 GitHub 아이디로 변경)
    assignees:
      - "unib35"
